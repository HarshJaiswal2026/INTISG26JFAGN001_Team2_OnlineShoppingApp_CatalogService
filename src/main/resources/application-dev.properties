server.port=8765

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/catalog_db
spring.datasource.username=catalog_user
spring.datasource.password=catalog_user_pass

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#IMAGE HANDLING
# 1. The physical path on your hard drive (Use forward slashes even on Windows)
app.upload.dir=C:/ecommerce/uploads/catalog/

# 2. The Base URL for your API to serve these images
app.image.base-url=http://localhost:8765/api/v1/catalog/images/

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Disable the specific feature that is crashing
springdoc.show-actuator=false
springdoc.webmvc.actuator.enabled=false

# Force Swagger to use a simpler scanning method that doesn't trigger the missing class
springdoc.use-management-port=false